<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>مشاهدة الفيديو | منصة مستر محمد يوسف</title>

    <!-- Google Font -->
    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="course-details.css"
    >
    
</head>


<body>


    <!-- =====================================
                    BACKGROUND
    ====================================== -->

    <div class="background"></div>


    <!-- =====================================
                      HEADER
    ====================================== -->

    <header class="header">

        <!-- LOGO -->
        <a
            href="index.html"
            class="logo"
        >
            <i class="fa-solid fa-atom"></i>

            <span>
                M.YOUSSEF
            </span>
        </a>


        <!-- BACK BUTTON -->
        <button
            type="button"
            class="back-btn"
            id="backBtn"
        >
            <i class="fa-solid fa-arrow-right"></i>

            <span>
                العودة لمحتوى الكورس
            </span>
        </button>

    </header>


    <!-- =====================================
                       PAGE
    ====================================== -->

    <main class="video-page">


        <!-- =================================
                    VIDEO HEADING
        ================================== -->

        <section class="video-heading">

            <span
                class="course-name"
                id="courseTitle"
            >
                اسم الكورس
            </span>


            <h1 id="videoTitle">
                عنوان الفيديو
            </h1>

        </section>


        <!-- =================================
                    PLAYER CARD
        ================================== -->

        <section class="player-card">


            <!-- VIDEO WRAPPER -->
            <div
                class="video-wrapper"
                id="videoWrapper"

            ><div id="studentWatermark"></div>

                <!-- =========================
                    DIRECT VIDEO PLAYER
                ========================== -->

                <video
                    id="videoPlayer"
                    class="direct-video"
                    preload="metadata"
                    playsinline
                >
                    متصفحك لا يدعم تشغيل الفيديو.
                </video>


                <!-- =========================
                       YOUTUBE PLAYER
                ========================== -->

                <div
                    id="youtubePlayer"
                    class="youtube-player hidden"
                ></div>


                <!-- =========================
                         VIDEO LOADER
                ========================== -->

                <div
                    class="video-loader hidden"
                    id="videoLoader"
                >

                    <div class="loader-spinner"></div>

                    <span>
                        جاري تحميل الفيديو...
                    </span>

                </div>


                <!-- =========================
                       BIG PLAY BUTTON
                ========================== -->

                <button
                    type="button"
                    class="big-play-btn"
                    id="bigPlayBtn"
                    aria-label="تشغيل الفيديو"
                >

                    <span class="play-circle">

                        <i class="fa-solid fa-play"></i>

                    </span>

                </button>


                <!-- =========================
                       PLAYER CONTROLS
                ========================== -->

                <div
                    class="video-controls"
                    id="videoControls"
                >


                    <!-- =====================
                         PROGRESS BAR
                    ====================== -->

                    <div class="progress-container">

                        <input
                            type="range"
                            id="progressBar"
                            class="progress-bar"
                            min="0"
                            max="100"
                            value="0"
                            step="0.1"
                            aria-label="تقدم الفيديو"
                        >

                    </div>


                    <!-- =====================
                         CONTROLS ROW
                    ====================== -->

                    <div class="controls-row">


                        <!-- =================
                           RIGHT CONTROLS
                        ================== -->

                        <div class="controls-group">


                            <!-- BACKWARD 10 SECONDS -->

                            <button
                                type="button"
                                class="control-btn"
                                id="backwardBtn"
                                title="رجوع 10 ثوانٍ"
                            >

                                <i class="fa-solid fa-backward"></i>

                            </button>


                            <!-- PLAY / PAUSE -->

                            <button
                                type="button"
                                class="control-btn main-control"
                                id="playPauseBtn"
                                title="تشغيل أو إيقاف"
                            >

                                <i class="fa-solid fa-play"></i>

                            </button>


                            <!-- FORWARD 10 SECONDS -->

                            <button
                                type="button"
                                class="control-btn"
                                id="forwardBtn"
                                title="تقديم 10 ثوانٍ"
                            >

                                <i class="fa-solid fa-forward"></i>

                            </button>


                            <!-- VOLUME -->

                            <div class="volume-control">

                                <button
                                    type="button"
                                    class="control-btn"
                                    id="muteBtn"
                                    title="الصوت"
                                >

                                    <i class="fa-solid fa-volume-high"></i>

                                </button>


                                <input
                                    type="range"
                                    id="volumeBar"
                                    class="volume-bar"
                                    min="0"
                                    max="1"
                                    step="0.01"
                                    value="1"
                                    aria-label="مستوى الصوت"
                                >

                            </div>


                            <!-- TIME -->

                            <div class="time-display">

                                <span id="currentTime">
                                    00:00
                                </span>

                                <span class="time-divider">
                                    /
                                </span>

                                <span id="duration">
                                    00:00
                                </span>

                            </div>

                        </div>


                        <!-- =================
                            LEFT CONTROLS
                        ================== -->

                        <div class="controls-group">


                            <!-- SETTINGS -->

                            <div class="settings-wrapper">


                                <!-- SETTINGS BUTTON -->

                                <button
                                    type="button"
                                    class="control-btn"
                                    id="settingsBtn"
                                    title="الإعدادات"
                                    aria-label="الإعدادات"
                                >

                                    <i class="fa-solid fa-gear"></i>

                                </button>


                                <!-- SETTINGS MENU -->

                                <div
                                    class="settings-menu hidden"
                                    id="settingsMenu"
                                >


                                    <!-- MENU TITLE -->

                                    <div class="settings-title">

                                        <i class="fa-solid fa-gauge-high"></i>

                                        <span>
                                            سرعة التشغيل
                                        </span>

                                    </div>


                                    <!-- 0.5 -->

                                    <button
                                        type="button"
                                        class="speed-option"
                                        data-speed="0.5"
                                    >

                                        <span>
                                            0.5x
                                        </span>

                                    </button>


                                    <!-- 0.75 -->

                                    <button
                                        type="button"
                                        class="speed-option"
                                        data-speed="0.75"
                                    >

                                        <span>
                                            0.75x
                                        </span>

                                    </button>


                                    <!-- NORMAL -->

                                    <button
                                        type="button"
                                        class="speed-option active"
                                        data-speed="1"
                                    >

                                        <span>
                                            عادي
                                        </span>

                                        <i class="fa-solid fa-check"></i>

                                    </button>


                                    <!-- 1.25 -->

                                    <button
                                        type="button"
                                        class="speed-option"
                                        data-speed="1.25"
                                    >

                                        <span>
                                            1.25x
                                        </span>

                                    </button>


                                    <!-- 1.5 -->

                                    <button
                                        type="button"
                                        class="speed-option"
                                        data-speed="1.5"
                                    >

                                        <span>
                                            1.5x
                                        </span>

                                    </button>


                                    <!-- 1.75 -->

                                    <button
                                        type="button"
                                        class="speed-option"
                                        data-speed="1.75"
                                    >

                                        <span>
                                            1.75x
                                        </span>

                                    </button>


                                    <!-- 2 -->

                                    <button
                                        type="button"
                                        class="speed-option"
                                        data-speed="2"
                                    >

                                        <span>
                                            2x
                                        </span>

                                    </button>


                                </div>

                            </div>


                            <!-- FULLSCREEN -->

                            <button
                                type="button"
                                class="control-btn"
                                id="fullscreenBtn"
                                title="ملء الشاشة"
                                aria-label="ملء الشاشة"
                            >

                                <i class="fa-solid fa-expand"></i>

                            </button>


                        </div>

                    </div>

                </div>


                <!-- =========================
                     VIDEO TYPE BADGE
                ========================== -->

                <div
                    class="video-type-badge"
                    id="videoTypeBadge"
                >

                    <i class="fa-solid fa-circle-play"></i>

                    <span>
                        M.YOUSSEF PLAYER
                    </span>

                </div>


            </div>

        </section>


        <!-- =================================
                   VIDEO SHORTCUTS
        ================================== -->

        <section class="player-info">


            <div class="info-item">

                <i class="fa-solid fa-keyboard"></i>

                <span>
                    Space للتشغيل والإيقاف
                </span>

            </div>


            <div class="info-item">

                <i class="fa-solid fa-forward"></i>

                <span>
                    الأسهم للتقديم والرجوع
                </span>

            </div>


            <div class="info-item">

                <i class="fa-solid fa-expand"></i>

                <span>
                    F لملء الشاشة
                </span>

            </div>


            <div class="info-item">

                <i class="fa-solid fa-gear"></i>

                <span>
                    الإعدادات لتغيير سرعة الفيديو
                </span>

            </div>


        </section>


        <!-- =================================
                       ERROR BOX
        ================================== -->

        <div
            class="error-box hidden"
            id="errorBox"
        >

            <div class="error-icon">

                <i class="fa-solid fa-triangle-exclamation"></i>

            </div>


            <div>

                <h3>
                    تعذر تشغيل الفيديو
                </h3>

                <p id="errorText">
                    تأكد من صحة رابط الفيديو.
                </p>

            </div>

        </div>


    </main>

   

    <!-- =====================================
                YOUTUBE IFRAME API
    ====================================== -->

    <script src="https://www.youtube.com/iframe_api"></script>


    <!-- =====================================
                  PLAYER JAVASCRIPT
    ====================================== -->

    <script type="module" src="auth-guard.js"></script>
<script type="module" src="course-details.js"></script>


</body>

</html>
