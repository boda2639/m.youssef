<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>تسجيل الدخول | منصة مستر محمد يوسف</title>

    <!-- Google Font -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="login.css">
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
>

<link
    rel="stylesheet"
    href="navbar.css"
>
</head>


<body>
    <div id="navbar-container"></div>

    


    <!-- قسم تسجيل الدخول -->
    <section class="login-section">


        <!-- الكارت -->
        <div class="login-card">


            <!-- رأس الكارت -->
            <div class="form-header">

                <div class="header-icon">

                    <i class="fa-solid fa-right-to-bracket"></i>

                </div>


                <h1>
                    مرحباً بعودتك
                </h1>


                <p>
                    سجل دخولك للوصول إلى محاضراتك واختباراتك
                </p>

            </div>



            <!-- الفورم -->
            <form id="loginForm">


                <!-- البريد الإلكتروني -->
                <div class="input-group">

                    <label for="loginEmail">

                        البريد الإلكتروني

                        <span>*</span>

                    </label>


                    <div class="input-box">

                        <i class="fa-solid fa-envelope"></i>


                        <input
                            type="email"
                            id="loginEmail"
                            placeholder="example@gmail.com"
                            autocomplete="email"
                            required
                        >

                    </div>

                </div>



                <!-- كلمة المرور -->
                <div class="input-group">

                    <label for="loginPassword">

                        كلمة المرور

                        <span>*</span>

                    </label>


                    <div class="input-box">

                        <i class="fa-solid fa-lock"></i>


                        <input
                            type="password"
                            id="loginPassword"
                            placeholder="اكتب كلمة المرور"
                            autocomplete="current-password"
                            required
                        >


                        <!-- إظهار كلمة المرور -->
                        <i
                            class="fa-solid fa-eye toggle-password"
                            id="togglePassword">
                        </i>

                    </div>

                </div>



                <!-- خيارات -->
                <div class="form-options">


                    <label class="remember-me">

                        <input
                            type="checkbox"
                            id="rememberMe"
                        >

                        <span>
                            تذكرني على هذا الجهاز
                        </span>

                    </label>


                    <a href="#" id="forgotPassword">

                        نسيت كلمة المرور؟

                    </a>

                </div>



                <!-- رسالة الحالة -->
                <div
                    class="message-box"
                    id="messageBox">
                </div>



                <!-- زر تسجيل الدخول -->
                <button
                    type="submit"
                    class="submit-btn"
                    id="loginButton">


                    <span id="buttonText">

                        تسجيل الدخول

                    </span>


                    <i
                        class="fa-solid fa-arrow-left"
                        id="buttonIcon">
                    </i>


                    <i
                        class="fa-solid fa-spinner fa-spin loader"
                        id="buttonLoader">
                    </i>

                </button>


            </form>



            <!-- إنشاء حساب -->
            <div class="register-link">

                <span>
                    ليس لديك حساب؟
                </span>


                <a href="register.html">

                    إنشاء حساب طالب جديد

                </a>

            </div>


        </div>

    </section>



    <!-- JavaScript -->
    <script
        type="module"
        src="login.js">
    </script>
<script src="navbar.js"></script>
</body>

</html>
